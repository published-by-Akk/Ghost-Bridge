<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Deliver | Command Console</title>
    <style>
        :root { 
            --bg: #020617; 
            --card: rgba(30, 41, 59, 0.7); 
            --accent: #38bdf8; 
            --text: #f8fafc; 
            --success: #22c55e; 
            --error: #ef4444; 
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
            background-image: radial-gradient(circle at top right, #1e293b, transparent);
        }

        .container { 
            background: var(--card); 
            backdrop-filter: blur(12px);
            padding: 2.5rem; 
            border-radius: 2rem; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); 
            border: 1px solid var(--border);
            margin: 15px;
        }

        h2 { 
            text-align: center; color: var(--accent); 
            margin-bottom: 2rem; font-weight: 800; 
            letter-spacing: -0.05em; text-transform: uppercase;
        }

        .bento-section {
            background: rgba(15, 23, 42, 0.6);
            padding: 1.25rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        label { 
            display: block; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 0.15em; 
            margin-bottom: 0.75rem; opacity: 0.5; font-weight: 600;
        }

        /* Question Number Controls */
        .q-controls {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem;
        }
        .arrow-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.75rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .arrow-btn:active { transform: scale(0.9); }
        #qNumDisplay { font-size: 1.5rem; font-weight: 800; color: var(--text); min-width: 40px; text-align: center; }

        /* Choice Grid */
        .choice-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem;
        }
        .choice-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Input Styles */
        input { 
            width: 100%; background: var(--bg); 
            border: 1px solid var(--border); 
            border-radius: 0.75rem; padding: 1rem; 
            color: white; font-size: 1rem; 
            box-sizing: border-box; outline: none; transition: 0.2s; 
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        /* Action Buttons */
        button.primary { 
            width: 100%; padding: 1.2rem; border-radius: 1rem; 
            font-weight: 800; cursor: pointer; border: none; 
            margin-top: 0.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-push { background: var(--accent); color: #020617; }
        .btn-sess { 
            background: transparent; color: var(--error); 
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            font-size: 0.7rem; padding: 0.5rem !important; margin-bottom: 2rem;
        }
        .btn-sess:hover { background: rgba(239, 68, 68, 0.1); }

        #status { font-size: 0.75rem; text-align: center; margin-top: 1.5rem; opacity: 0.4; font-family: monospace; }

        .success-state { background: var(--success) !important; color: white !important; }
        .error-state { background: var(--error) !important; color: white !important; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-sess primary" id="sessBtn" onclick="resetBridge()">Wipe Session</button>
        <h2>Ghost Console</h2>

        <div class="bento-section">
            <label>Question Number</label>
            <div class="q-controls">
                <button class="arrow-btn" onclick="changeQ(-1)">←</button>
                <div id="qNumDisplay">1</div>
                <button class="arrow-btn" onclick="changeQ(1)">→</button>
            </div>
        </div>

        <div class="bento-section">
            <label>Selection</label>
            <div class="choice-grid">
                <button class="choice-btn" onclick="setChoice('A')">A</button>
                <button class="choice-btn" onclick="setChoice('B')">B</button>
                <button class="choice-btn" onclick="setChoice('C')">C</button>
                <button class="choice-btn" onclick="setChoice('D')">D</button>
            </div>
        </div>

        <div class="bento-section">
            <label>Answers & Text Box</label>
            <input type="text" id="qText" placeholder="Enter logic or answer details..." autocomplete="off">
        </div>

        <button class="btn-push primary" id="mainBtn" onclick="send()">Push to Cloud</button>
        <div id="status">Systems Online</div>
    </div>

    <script>
        const API = 'https://ghost-bridge-xyvu.onrender.com';
        let currentQ = 1;
        let currentChoice = "";

        function changeQ(val) {
            currentQ = Math.max(1, currentQ + val);
            document.getElementById('qNumDisplay').innerText = currentQ;
        }

        function setChoice(choice) {
            currentChoice = (currentChoice === choice) ? "" : choice;
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === currentChoice);
            });
        }

        async function resetBridge() {
            if(!confirm("Are you sure you want to wipe the current session?")) return;
            try {
                await fetch(API, { method: 'POST', body: JSON.stringify({ clear: true }) });
                currentQ = 1;
                document.getElementById('qNumDisplay').innerText = 1;
                setChoice("");
            } catch(e) { alert("Failed to clear session."); }
        }

        async function send() {
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('status');
            const t = document.getElementById('qText').value;
            
            const msg = `[${currentQ}] ${currentChoice}${currentChoice?'. ':''}${t}`;
            
            btn.innerText = "Syncing...";
            btn.disabled = true;

            try {
                const response = await fetch(API, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg }) 
                });
                
                const result = await response.json();

                if (result.status === "SUCCESS") {
                    btn.innerText = "Reached ✓";
                    btn.classList.add('success-state');
                    status.innerText = "LAST SYNC: " + new Date().toLocaleTimeString();
                    
                    setTimeout(() => {
                        btn.innerText = "Push to Cloud";
                        btn.classList.remove('success-state');
                        btn.disabled = false;
                        changeQ(1);
                        document.getElementById('qText').value = "";
                        setChoice(""); // Optional: reset choice after send
                    }, 1000);
                }
            } catch (e) {
                btn.innerText = "Link Broken";
                btn.classList.add('error-state');
                status.innerText = "ERROR: Connection Timed Out";
                setTimeout(() => { btn.innerText = "Push to Cloud"; btn.classList.remove('error-state'); btn.disabled = false; }, 2000);
            }
        }
    </script>
</body>
</html>
